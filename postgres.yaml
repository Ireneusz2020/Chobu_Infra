apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: chobu
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-nfs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: chobu
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: chobu
            - name: POSTGRES_PASSWORD
              value: chobu
            - name: POSTGRES_DB
              value: chobu
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: managed-nfs
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chobu
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
